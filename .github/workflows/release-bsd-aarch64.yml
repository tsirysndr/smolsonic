name: Release (BSD aarch64)

# These builds run under emulation and are far too slow to block the main
# release workflow. They run independently on the same tag push and upload
# their tarballs to the GitHub release once it exists.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: freebsd-aarch64
            os: freebsd
            os_version: "14.3"
            arch: arm64
            install_rust: sudo env ASSUME_ALWAYS_YES=YES pkg install -y rust
          - label: netbsd-aarch64
            os: netbsd
            os_version: "10.1"
            arch: arm64
            install_rust: sudo pkgin -y update && sudo pkgin -y install rust
          # - label: openbsd-aarch64
          #   os: openbsd
          #   os_version: "7.9"
          #   arch: arm64
          #   install_rust: sudo pkg_add rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # On manual dispatch, build the tag's code rather than the branch
          # the workflow was dispatched from.
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install web UI dependencies
        working-directory: s3webui
        run: bun install --frozen-lockfile

      - name: Build web UI
        working-directory: s3webui
        run: bun run build

      # The binary embeds s3webui/dist; node_modules is not needed inside the
      # VM and would make the workspace sync very slow.
      - name: Trim workspace before VM sync
        run: rm -rf s3webui/node_modules

      - name: Start ${{ matrix.os }} ${{ matrix.arch }} VM
        uses: cross-platform-actions/action@v1.3.0
        with:
          operating_system: ${{ matrix.os }}
          version: ${{ matrix.os_version }}
          architecture: ${{ matrix.arch }}
          shell: bash
          memory: 8G
          cpu_count: 4

      - name: Build in VM
        shell: cpa.sh {0}
        run: |
          set -euo pipefail
          ${{ matrix.install_rust }}
          # OpenBSD's default datasize ulimit is too low for rustc
          ulimit -d "$(ulimit -H -d)" 2>/dev/null || true
          # Keep target/ outside the workspace so it isn't synced back
          export CARGO_TARGET_DIR="$HOME/build"
          cargo build --release --locked
          mkdir -p dist
          cp "$CARGO_TARGET_DIR/release/smolsonic" dist/smolsonic

      - name: Package tarball
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.tag }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          name="smolsonic-${version}-${{ matrix.label }}"
          mkdir -p dist/staging
          install -m 0755 dist/smolsonic dist/staging/smolsonic
          cp README.md LICENSE smolsonic.example.toml dist/staging/
          tar -C dist/staging -czf "dist/${name}.tar.gz" .
          (cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256")
          ls -lh dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: dist/*.tar.gz*
          if-no-files-found: error

  upload:
    name: Attach to GitHub release
    needs: build
    # Upload whatever succeeded even if one platform failed.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Show artifacts
        run: |
          ls -lh dist
          if ! compgen -G "dist/*" >/dev/null; then
            echo "No artifacts to upload (all builds failed)"
            exit 1
          fi

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          # The main release workflow publishes the release; these builds
          # usually finish long after it, but wait a bit just in case.
          for i in $(seq 1 30); do
            if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              break
            fi
            echo "Release $tag not found yet, waiting... ($i/30)"
            sleep 60
          done
          gh release upload "$tag" dist/* --clobber --repo "$GITHUB_REPOSITORY"
