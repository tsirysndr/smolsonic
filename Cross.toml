# Cross configuration. Pin the official cross-rs container images so the
# toolchain (and bundled libsqlite3 build) is reproducible across machines.
#
# Build locally with:
#   cargo install cross --locked
#   cross build --release --target arm-unknown-linux-gnueabihf      # armv6 (Pi 1/Zero)
#   cross build --release --target armv7-unknown-linux-gnueabihf    # armv7 / armhf (Pi 2+)
#   cross build --release --target aarch64-unknown-linux-gnu        # arm64 (Pi 4/5)

[target.arm-unknown-linux-gnueabihf]
image = "ghcr.io/cross-rs/arm-unknown-linux-gnueabihf:0.2.5"

[target.armv7-unknown-linux-gnueabihf]
image = "ghcr.io/cross-rs/armv7-unknown-linux-gnueabihf:0.2.5"

[target.aarch64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:0.2.5"
