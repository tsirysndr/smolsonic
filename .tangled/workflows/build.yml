when:
  - event: ["push", "pull_request"]
    branch: main

engine: microvm
image: nixos

dependencies:
  - cargo
  - rustc
  - rustfmt
  - gcc
  - bun

steps:
  - name: build webui
    command: |
      cd s3webui
      bun install --frozen-lockfile
      bun run build
  - name: build cli
    command: |
      cargo build --release --locked
      ls -l target/release
  - name: nix build
    command: |
      nix --extra-experimental-features 'nix-command flakes' build .#default --print-build-logs
      ls -l result/bin


