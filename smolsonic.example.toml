# smolsonic example configuration
music_dir = "/path/to/your/music"
username = "admin"
password = "changeme"

# Optional — defaults shown
port = 4533
host = "0.0.0.0"
database_path = "smolsonic.db"
covers_dir = "covers"
# Periodic full rescan, in seconds. Acts as a backstop when the filesystem
# watcher misses events (common on NFS/SMB/FUSE mounts on Linux, and on
# BSD/kqueue platforms when many files are dropped at once). Set to 0 to
# disable. Unchanged files are skipped via mtime, so this is cheap.
scan_interval_secs = 300

# Optional — Zeroconf/mDNS service broadcast. Enabled by default.
# Advertises smolsonic on the local network so clients can discover it.
# [mdns]
# enabled = true
# instance_name = "smolsonic"

# Optional S3-compatible upload API.
# Bucket name is fixed to "music" and region is "us-east-1".
# [s3]
# enabled = true
# host = "0.0.0.0"
# port = 9000
# access_key = "smolsonic"
# secret_key = "changeme-please"

# Optional Last.fm plugin. Powers the "Similar" rails on album/artist detail
# pages via artist.getSimilar. Register a free API key at last.fm/api.
# Omit the block entirely to disable — /…/Similar returns empty in that case.
# [lastfm]
# api_key = "your-lastfm-api-key"

# Optional MusicBrainz plugin. Supplements Last.fm with linked artists
# (collaborators, band members). MusicBrainz requires a descriptive user
# agent per their TOS — include app name, version, and contact info.
# [musicbrainz]
# user_agent = "smolsonic/0.7.0 ( you@example.com )"

# Optional Typesense search backend. When set, free-text search
# (/rest/search3, /rest/search2, Jellyfin ?searchTerm=) uses Typesense
# instead of the built-in SQLite FTS5 index — typo-tolerance, better ranking.
# Omit the block to keep using FTS5 (the default). Fresh Typesense nodes are
# reindexed automatically from SQLite on first startup.
# [typesense]
# url = "http://localhost:8108"
# api_key = "changeme"
# collection_prefix = "smolsonic"  # optional; lets multiple instances share a node

# Optional ListenBrainz scrobbling. When set, smolsonic submits `playing_now`
# on Jellyfin /Sessions/Playing (and Subsonic /rest/scrobble?submission=false)
# and a full listen on session-stop following the Last.fm scrobble rules:
# the track must be longer than 30 seconds AND played past the halfway
# point OR for at least 4 minutes. Get a token at listenbrainz.org/profile.
# Set api_url to your own for a self-hosted instance.
# [listenbrainz]
# token = "your-listenbrainz-user-token"
# api_url = "https://api.listenbrainz.org"  # optional; official default
